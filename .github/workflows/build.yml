name: Build and Release APK

on:
  push:
    branches: [ main, master, 'copilot/**' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Get version info
      id: version
      run: |
        VERSION=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName "\(.*\)".*/\1/')
        BUILD=$(grep "versionCode" app/build.gradle | head -1 | sed 's/.*versionCode \([0-9]*\).*/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build=$BUILD" >> $GITHUB_OUTPUT
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/JackettProwlarrClient-v${{ steps.version.outputs.version }}-debug.apk

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: JackettProwlarrClient-v${{ steps.version.outputs.version }}-debug
        path: app/build/outputs/apk/debug/JackettProwlarrClient-v${{ steps.version.outputs.version }}-debug.apk
        retention-days: 30

    - name: Build Release APK (unsigned)
      run: ./gradlew assembleRelease

    - name: Rename Release APK
      run: |
        mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/JackettProwlarrClient-v${{ steps.version.outputs.version }}-release.apk || true

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: JackettProwlarrClient-v${{ steps.version.outputs.version }}-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
        if-no-files-found: ignore

  # Create a release on tags
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/JackettProwlarrClient-*.apk
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
